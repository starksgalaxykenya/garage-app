<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1d4ed8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage Manager PRO — SaaS Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 font-sans">

<!-- ===== LOGIN SCREEN ===== -->
<section id="admin-auth" class="flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm">
        <h2 class="text-2xl font-bold mb-2 text-center text-indigo-800">SaaS Admin Panel</h2>
        <p class="text-center text-gray-500 text-sm mb-6">Garage Manager PRO</p>
        <input id="admin-email" type="email" placeholder="Admin Email" class="w-full p-3 mb-3 border rounded-lg" />
        <input id="admin-password" type="password" placeholder="Password" class="w-full p-3 mb-4 border rounded-lg" />
        <p id="admin-auth-msg" class="text-red-500 text-sm mb-3 text-center"></p>
        <button onclick="adminLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg">Login</button>
    </div>
</section>

<!-- ===== DASHBOARD ===== -->
<div id="admin-dashboard" class="hidden">
    <header class="bg-indigo-800 text-white px-8 py-4 flex justify-between items-center shadow-lg">
        <div>
            <h1 class="text-2xl font-extrabold">SaaS Admin Panel</h1>
            <p class="text-indigo-200 text-sm">Garage Manager PRO — Subscription Management</p>
        </div>
        <button onclick="adminLogout()" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-lg">Logout</button>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 space-y-8">

        <!-- Stats Row -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white rounded-xl shadow p-4 text-center">
                <div id="stat-total" class="text-3xl font-extrabold text-indigo-700">—</div>
                <div class="text-gray-500 text-sm mt-1">Total Garages</div>
            </div>
            <div class="bg-white rounded-xl shadow p-4 text-center">
                <div id="stat-active" class="text-3xl font-extrabold text-green-600">—</div>
                <div class="text-gray-500 text-sm mt-1">Active</div>
            </div>
            <div class="bg-white rounded-xl shadow p-4 text-center">
                <div id="stat-trial" class="text-3xl font-extrabold text-yellow-500">—</div>
                <div class="text-gray-500 text-sm mt-1">Free Trial</div>
            </div>
            <div class="bg-white rounded-xl shadow p-4 text-center">
                <div id="stat-inactive" class="text-3xl font-extrabold text-red-500">—</div>
                <div class="text-gray-500 text-sm mt-1">Inactive</div>
            </div>
        </div>

        <!-- Create New Garage -->
        <div class="bg-white rounded-xl shadow-lg p-6">
            <h2 class="text-xl font-bold text-indigo-700 mb-4 border-b pb-2">➕ Onboard New Garage</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Garage Name</label>
                    <input id="new-garage-name" type="text" placeholder="e.g. Nairobi Auto Works" class="w-full p-3 border rounded-lg" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Owner Name</label>
                    <input id="new-owner-name" type="text" placeholder="Owner Full Name" class="w-full p-3 border rounded-lg" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Owner Email</label>
                    <input id="new-owner-email" type="email" placeholder="owner@garage.com" class="w-full p-3 border rounded-lg" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Owner Password</label>
                    <input id="new-owner-password" type="password" placeholder="Min 6 chars" class="w-full p-3 border rounded-lg" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Owner Phone</label>
                    <input id="new-owner-contact" type="text" placeholder="+2547..." class="w-full p-3 border rounded-lg" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Subscription Plan</label>
                    <select id="new-sub-status" class="w-full p-3 border rounded-lg">
                        <option value="trial">Free Trial (14 days)</option>
                        <option value="active">Active (Paid)</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">
                        Garage Code
                        <span class="text-gray-400 font-normal">(Auto-generated or custom LLL-NNNNN)</span>
                    </label>
                    <div class="flex gap-2">
                        <input id="new-garage-code" type="text" placeholder="e.g. NAI-00123" maxlength="9"
                               class="w-full p-3 border rounded-lg uppercase" />
                        <button onclick="generateCode()" class="bg-gray-200 hover:bg-gray-300 px-3 rounded-lg text-sm font-medium whitespace-nowrap">Auto</button>
                    </div>
                </div>
                <div class="flex items-end">
                    <button onclick="createGarage()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg">
                        Create & Issue Code
                    </button>
                </div>
            </div>
            <p id="create-msg" class="mt-3 text-sm font-medium text-center"></p>
        </div>

        <!-- Garages List -->
        <div class="bg-white rounded-xl shadow-lg p-6">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h2 class="text-xl font-bold text-indigo-700">🏪 All Garages</h2>
                <div class="flex gap-2">
                    <input id="search-garages" type="text" placeholder="Search by name, code, owner..." 
                           oninput="filterGarages()" class="p-2 border rounded-lg text-sm w-64" />
                    <button onclick="refreshGarages()" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-sm">Refresh</button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200 text-sm">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Code</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Garage Name</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Owner</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Contact</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Email</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Status</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Trial Start</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="garages-table-body" class="bg-white divide-y divide-gray-200"></tbody>
                </table>
                <p id="garages-empty" class="text-center text-gray-400 py-8 hidden">No garages found.</p>
            </div>
        </div>

    </main>
</div>

<script>
// ===== FIREBASE CONFIG =====
const firebaseConfig = {
    apiKey: "AIzaSyBCvFltNyGj3SYR-ADUocWD5EVjljoCEp8",
    authDomain: "garage-manager-1ac7c.firebaseapp.com",
    projectId: "garage-manager-1ac7c",
    storageBucket: "garage-manager-1ac7c.firebasestorage.app",
    messagingSenderId: "226684256206",
    appId: "1:226684256206:web:13d600d6db4c603506759f"
};

const app = firebase.initializeApp(firebaseConfig);
const auth = app.auth();
const db = app.firestore();
const garagesRef = db.collection('garages');
const adminsRef = db.collection('admins');

let allGaragesData = [];

// ===== AUTH =====
function adminLogin() {
    const email = document.getElementById('admin-email').value;
    const pass = document.getElementById('admin-password').value;
    auth.signInWithEmailAndPassword(email, pass)
        .catch(err => {
            document.getElementById('admin-auth-msg').textContent = err.message;
        });
}

function adminLogout() {
    auth.signOut();
}

auth.onAuthStateChanged(async user => {
    if (user) {
        // Check if user is an admin by looking up their UID in the 'admins' collection
        try {
            const adminDoc = await adminsRef.doc(user.uid).get();
            if (adminDoc.exists) {
                document.getElementById('admin-auth').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                listenForGarages();
            } else {
                auth.signOut();
                document.getElementById('admin-auth-msg').textContent = 'Access denied. Not an admin.';
            }
        } catch (err) {
            console.error('Admin check error:', err);
            auth.signOut();
            document.getElementById('admin-auth-msg').textContent = 'Error verifying admin status.';
        }
    } else {
        document.getElementById('admin-auth').classList.remove('hidden');
        document.getElementById('admin-dashboard').classList.add('hidden');
    }
});

// ===== CODE GENERATOR =====
function generateCode() {
    const letters = () => Array.from({length: 3}, () => 
        String.fromCharCode(65 + Math.floor(Math.random() * 26))).join('');
    const numbers = () => String(Math.floor(Math.random() * 90000) + 10000);
    document.getElementById('new-garage-code').value = `${letters()}-${numbers()}`;
}

// ===== CREATE GARAGE =====
async function createGarage() {
    const name = document.getElementById('new-garage-name').value.trim();
    const owner = document.getElementById('new-owner-name').value.trim();
    const email = document.getElementById('new-owner-email').value.trim();
    const password = document.getElementById('new-owner-password').value.trim();
    const contact = document.getElementById('new-owner-contact').value.trim();
    const status = document.getElementById('new-sub-status').value;
    const code = document.getElementById('new-garage-code').value.trim().toUpperCase();
    const msg = document.getElementById('create-msg');

    if (!name || !owner || !code || !email || !password) {
        msg.className = 'mt-3 text-sm font-medium text-center text-red-600';
        msg.textContent = 'Please fill in Garage Name, Owner, Email, Password, and Garage Code.';
        return;
    }
    if (password.length < 6) {
        msg.className = 'mt-3 text-sm font-medium text-center text-red-600';
        msg.textContent = 'Password must be at least 6 characters.';
        return;
    }

    const codeRegex = /^[A-Z]{3}-\d{5}$/;
    if (!codeRegex.test(code)) {
        msg.className = 'mt-3 text-sm font-medium text-center text-red-600';
        msg.textContent = 'Invalid code format. Must be LLL-NNNNN (e.g. NAI-00123)';
        return;
    }

    try {
        // 1. Check if garage code already exists
        const existing = await garagesRef.doc(code).get();
        if (existing.exists) {
            msg.className = 'mt-3 text-sm font-medium text-center text-red-600';
            msg.textContent = `Code ${code} already exists. Try another.`;
            return;
        }

        // 2. Create Firebase Auth user
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const uid = userCredential.user.uid;

        // 3. Save garage document
        await garagesRef.doc(code).set({
            garageName: name,
            ownerName: owner,
            ownerEmail: email,
            ownerUid: uid,
            ownerContact: contact,
            subscriptionStatus: status,
            garageCode: code,
            trialStartDate: status === 'trial' ? new Date().toISOString().split('T')[0] : null,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            pins: {
                mechanic: '1234',
                admin: '5678',
                manager: '9012'
            }
        });

        msg.className = 'mt-3 text-sm font-medium text-center text-green-600';
        msg.textContent = `✅ Garage created! Code: ${code} — Owner email: ${email}. Share the code with staff.`;

        // Clear form
        ['new-garage-name','new-garage-code','new-owner-name','new-owner-email','new-owner-password','new-owner-contact'].forEach(id => {
            document.getElementById(id).value = '';
        });
        document.getElementById('new-sub-status').value = 'trial';
    } catch (err) {
        console.error('Full error:', err);
        msg.className = 'mt-3 text-sm font-medium text-center text-red-600';
        msg.textContent = 'Error creating garage: ' + err.message;
    }
}

// ===== REAL-TIME LISTENER =====
function listenForGarages() {
    garagesRef.orderBy('createdAt', 'desc').onSnapshot(
        snap => {
            allGaragesData = [];
            snap.forEach(doc => allGaragesData.push({ id: doc.id, ...doc.data() }));
            renderGarages(allGaragesData);
            updateStats(allGaragesData);
        },
        error => {
            console.error('Garages listener error:', error);
            document.getElementById('garages-empty').textContent = 'Error loading garages: ' + error.message;
            document.getElementById('garages-empty').classList.remove('hidden');
        }
    );
}

// ===== MANUAL REFRESH (for debugging) =====
window.refreshGarages = async function() {
    try {
        const snap = await garagesRef.orderBy('createdAt', 'desc').get();
        allGaragesData = [];
        snap.forEach(doc => allGaragesData.push({ id: doc.id, ...doc.data() }));
        renderGarages(allGaragesData);
        updateStats(allGaragesData);
        document.getElementById('garages-empty').classList.add('hidden');
    } catch (err) {
        console.error('Refresh error:', err);
        document.getElementById('garages-empty').textContent = 'Refresh error: ' + err.message;
        document.getElementById('garages-empty').classList.remove('hidden');
    }
};

function updateStats(data) {
    document.getElementById('stat-total').textContent = data.length;
    document.getElementById('stat-active').textContent = data.filter(g => g.subscriptionStatus === 'active').length;
    document.getElementById('stat-trial').textContent = data.filter(g => g.subscriptionStatus === 'trial').length;
    document.getElementById('stat-inactive').textContent = data.filter(g => g.subscriptionStatus === 'inactive').length;
}

function filterGarages() {
    const q = document.getElementById('search-garages').value.toLowerCase();
    const filtered = allGaragesData.filter(g =>
        (g.garageName || '').toLowerCase().includes(q) ||
        (g.garageCode || '').toLowerCase().includes(q) ||
        (g.ownerName || '').toLowerCase().includes(q) ||
        (g.ownerEmail || '').toLowerCase().includes(q)
    );
    renderGarages(filtered);
}

function renderGarages(data) {
    const tbody = document.getElementById('garages-table-body');
    const empty = document.getElementById('garages-empty');
    tbody.innerHTML = '';

    if (data.length === 0) {
        empty.classList.remove('hidden');
        return;
    }
    empty.classList.add('hidden');

    data.forEach(g => {
        const statusColors = {
            active: 'bg-green-100 text-green-800',
            trial: 'bg-yellow-100 text-yellow-800',
            inactive: 'bg-red-100 text-red-800'
        };
        const color = statusColors[g.subscriptionStatus] || 'bg-gray-100 text-gray-800';

        const tr = document.createElement('tr');
        tr.className = 'hover:bg-gray-50';
        tr.innerHTML = `
            <td class="px-4 py-3 font-mono font-bold text-indigo-700">${g.garageCode || g.id}</td>
            <td class="px-4 py-3 font-medium text-gray-900">${g.garageName || '—'}</td>
            <td class="px-4 py-3 text-gray-600">${g.ownerName || '—'}</td>
            <td class="px-4 py-3 text-gray-600">${g.ownerContact || '—'}</td>
            <td class="px-4 py-3 text-gray-600">${g.ownerEmail || '—'}</td>
            <td class="px-4 py-3">
                <select onchange="updateStatus('${g.id}', this.value)"
                        class="text-xs font-semibold px-2 py-1 rounded-full border-0 ${color} cursor-pointer">
                    <option value="active" ${g.subscriptionStatus==='active'?'selected':''}>Active</option>
                    <option value="trial" ${g.subscriptionStatus==='trial'?'selected':''}>Free Trial</option>
                    <option value="inactive" ${g.subscriptionStatus==='inactive'?'selected':''}>Inactive</option>
                </select>
            </td>
            <td class="px-4 py-3 text-gray-500 text-xs">${g.trialStartDate || '—'}</td>
            <td class="px-4 py-3 space-x-2">
                <button onclick="copyCode('${g.garageCode || g.id}')" 
                        class="text-indigo-600 hover:text-indigo-800 text-xs font-medium">Copy Code</button>
                <button onclick="deleteGarage('${g.id}')" 
                        class="text-red-500 hover:text-red-700 text-xs font-medium">Delete</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

// ===== ACTIONS =====
async function updateStatus(docId, newStatus) {
    const updates = { subscriptionStatus: newStatus };
    if (newStatus === 'trial') {
        updates.trialStartDate = new Date().toISOString().split('T')[0];
    }
    await garagesRef.doc(docId).update(updates);
}

function copyCode(code) {
    navigator.clipboard.writeText(code)
        .then(() => alert(`Garage code copied: ${code}\nShare this with the garage owner.`));
}

function deleteGarage(id) {
    if (confirm('Delete this garage permanently? This cannot be undone.')) {
        garagesRef.doc(id).delete();
    }
}

// Expose for inline handlers
window.generateCode = generateCode;
window.createGarage = createGarage;
window.updateStatus = updateStatus;
window.copyCode = copyCode;
window.deleteGarage = deleteGarage;
window.filterGarages = filterGarages;
window.adminLogin = adminLogin;
window.adminLogout = adminLogout;
window.refreshGarages = refreshGarages;
</script>
 <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('SW registered: ', reg))
        .catch(err => console.log('SW registration failed: ', err));
    });
  }
</script>   
</body>
</html>
